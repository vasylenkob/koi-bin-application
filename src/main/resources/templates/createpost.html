<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            color: #37474f;
        }

        header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        .nav-link {
            color: #546e7e;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #007bff;
        }

        .nav-item.active .nav-link {
            color: #007bff;
            font-weight: 600;
        }

        section {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .icon {
            font-size: 24px;
            color: #546e7e;
            transition: color 0.3s ease;
            text-decoration: none;
            margin: 0 10px;
        }

        .icon.github:hover { color: #000000; }
        .icon.telegram:hover { color: #0088cc; }
        .icon.instagram:hover { color: #C13584; }

        footer {
            padding: 15px;
            text-align: center;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<header>
    <nav class="container d-flex justify-content-between align-items-center">
        <img src="/images/koilogo.png" class="navbar-brand fw-bold" style="height: 65px;"></img>
        <div class="d-flex">
            <ul class="nav">
                <li class="nav-item">
                    <a href="/" class="nav-link">Home</a>
                </li>
                <li class="nav-item active">
                    <a href="/createpost" class="nav-link">Create Post</a>
                </li>
                <li class="nav-item">
                    <a href="/myposts" class="nav-link">My Posts</a>
                </li>
            </ul>
        </div>
    </nav>
</header>


<section>
    <div class="container pb-5">
        <h2 class="display-5 fw-bold mb-4">Create a new post</h2>
        <form action="/createpost" th:object="${postForm}" method="POST" class="mt-3">

            <!-- Title Field -->
            <div class="mb-3">
                <label for="title" class="form-label">Post Title</label>
                <input type="text" th:field="*{postTitle}" class="form-control" id="title" name="title" placeholder="Enter post title" required>
            </div>

            <!-- Content Field -->
            <div class="mb-3">
                <label for="content" class="form-label">Content</label>
                <textarea class="form-control" th:field="*{content}" id="content" name="content" rows="10" style="resize: none;" placeholder="Enter post content" required></textarea>
            </div>

            <!-- Lifetime Field -->
            <div class="mb-3">
                <label for="lifetimeMinutes" class="form-label">Lifetime</label>
                <select class="form-select" th:field="*{lifetimeMinutes}" id="lifetimeMinutes" name="lifetimeMinutes">
                    <option th:value="5">5 minutes</option>
                    <option th:value="10">10 minutes</option>
                    <option th:value="30">30 minutes</option>
                    <option th:value="60">1 hour</option>
                    <option th:value="1440">1 day</option>
                    <option th:value="10080">1 week</option>
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Submit Post</button>
        </form>
    </div>
</section>

<footer class="footer mt-auto">
    <div class="container">
        <p class="mb-1">Developed by @vasylenkob</p>
        <a href="https://github.com/vasylenkob" class="icon github" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://t.me/vasylenkob" class="icon telegram" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="https://www.instagram.com/vasylenko.b/" class="icon instagram" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</footer>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"></script>
</body>
</html>
