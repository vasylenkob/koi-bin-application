<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            color: #37474f;
        }

        header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        .nav-link {
            color: #546e7e;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #007bff;
        }

        .nav-item.active .nav-link {
            color: #007bff;
            font-weight: 600;
        }

        section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 0;
        }

        .icon {
            font-size: 24px;
            color: #546e7e;
            transition: color 0.3s ease;
            text-decoration: none;
            margin: 0 10px;
        }

        .icon.github:hover {
            color: #000000;
        }

        .icon.telegram:hover {
            color: #0088cc;
        }

        .icon.instagram:hover {
            color: #C13584;
        }

        footer {
            padding: 15px;
            text-align: center;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<header>
    <nav class="container d-flex justify-content-between align-items-center">
        <img src="/images/koilogo.png" class="navbar-brand fw-bold" style="height: 65px;"></img>
        <div class="d-flex">
            <ul class="nav">
                <li class="nav-item">
                    <a href="/" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/createpost" class="nav-link">Create Post</a>
                </li>
                <li class="nav-item">
                    <a href="/myposts" class="nav-link">My Posts</a>
                </li>
            </ul>
        </div>
    </nav>
</header>

<section>
    <div class="container">
        <h1 class="display-4 fw-bold mb-4 text-danger">Oops! Something went wrong.</h1>
        <p class="lead text-muted" th:text="${error}"></p>
        <a href="/" class="btn btn-primary mt-4">Go to Homepage</a>
    </div>
</section>

<footer class="footer mt-auto">
    <div class="container">
        <p class="mb-1">Developed by @vasylenkob</p>
        <a href="https://github.com/vasylenkob" class="icon github" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://t.me/vasylenkob" class="icon telegram" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="https://www.instagram.com/vasylenko.b/" class="icon instagram" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</footer>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"></script>
</body>
</html>
